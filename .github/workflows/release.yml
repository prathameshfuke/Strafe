name: Build and Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Convert icon.png to proper multi-size icon.ico
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $png = [System.Drawing.Image]::FromFile("$PWD\icon.png")
          $sizes = @(16, 32, 48, 256)
          $ms = New-Object System.IO.MemoryStream
          $bw = New-Object System.IO.BinaryWriter($ms)
          $bw.Write([UInt16]0)
          $bw.Write([UInt16]1)
          $bw.Write([UInt16]$sizes.Count)
          $dataOffset = 6 + ($sizes.Count * 16)
          $imageDataList = @()
          foreach ($size in $sizes) {
            $bmp = New-Object System.Drawing.Bitmap($size, $size)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
            $g.DrawImage($png, 0, 0, $size, $size)
            $g.Dispose()
            $imgMs = New-Object System.IO.MemoryStream
            $bmp.Save($imgMs, [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
            $imgData = $imgMs.ToArray()
            $imgMs.Dispose()
            $imageDataList += ,$imgData
          }
          $offset = $dataOffset
          for ($i = 0; $i -lt $sizes.Count; $i++) {
            $size = $sizes[$i]; $data = $imageDataList[$i]
            $w = if ($size -eq 256) { 0 } else { $size }
            $h = if ($size -eq 256) { 0 } else { $size }
            $bw.Write([byte]$w); $bw.Write([byte]$h)
            $bw.Write([byte]0); $bw.Write([byte]0)
            $bw.Write([UInt16]1); $bw.Write([UInt16]32)
            $bw.Write([UInt32]$data.Length); $bw.Write([UInt32]$offset)
            $offset += $data.Length
          }
          foreach ($data in $imageDataList) { $bw.Write($data) }
          $bw.Flush()
          $icoBytes = $ms.ToArray()
          $bw.Dispose(); $ms.Dispose(); $png.Dispose()
          [System.IO.File]::WriteAllBytes("$PWD\icon.ico", $icoBytes)
          Write-Host "icon.ico created: $($icoBytes.Length) bytes"

      - name: Build Vite renderer
        run: npx vite build

      - name: Build portable STRAFE.exe
        run: npx electron-builder --win portable --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm output
        shell: pwsh
        run: Get-ChildItem release/ | Select-Object Name, Length

      - name: Delete existing release (if any) to start fresh
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"; Accept = "application/vnd.github+json" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
          $existing = $releases | Where-Object { $_.tag_name -eq $tag }
          if ($existing) {
            Write-Host "Deleting existing release id=$($existing.id)"
            Invoke-RestMethod -Method Delete -Uri "https://api.github.com/repos/${{ github.repository }}/releases/$($existing.id)" -Headers $headers
          } else {
            Write-Host "No existing release for $tag"
          }

      - name: Upload STRAFE.exe to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "STRAFE v${{ github.ref_name }}"
          body: |
            ## STRAFE Game Library & Session Tracker

            **Download STRAFE.exe** — no installation needed. Just double-click and run.

            > **Windows SmartScreen:** If Windows shows a warning, click **More info → Run anyway**. The app is open source and safe.
          files: release/STRAFE.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
